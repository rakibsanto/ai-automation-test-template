  # ─────────────────────────────────────────────────────────────────────────────
  # PHASE 4.2 — AUTONOMOUS EXPLORATORY TESTING (QA-19)
  # ─────────────────────────────────────────────────────────────────────────────
  qa-agent-16-exploratory:
    name: "QA Agent 16 — Autonomous Explorer"
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      BASE_URL:                ${{ github.event.inputs.base_url || 'https://dev.prowhats.com/en' }}
      BROWSER_USE_ENABLED:     "false"   # set true once Ollama is hooked
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5

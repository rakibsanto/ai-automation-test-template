          if-no-files-found: warn

  # QA AGENT 14 — Memory Leak Detection (QA-17)
  qa-agent-14-memory-leak:
    name: "QA Agent 14 — Memory Leak"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      BASE_URL: ${{ github.event.inputs.base_url || 'https://dev.prowhats.com/en' }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with: { python-version: "3.12", cache: "pip" }
      - name: Install dependencies
        run: pip install playwright pytest pytest-playwright pytest-html pytest-timeout pytest-json-report Pillow
      - name: Install Playwright Chromium
        run: playwright install chromium --with-deps
      - name: Prepare reports directory
        run: mkdir -p reports reports/screenshots reports/evidence
      - name: Run QA-17 Memory Leak Tests
        continue-on-error: true
        # --enable-precise-memory-info exposes performance.memory in headless Chromium
        env:
          PWDEBUG_BROWSER_ARGS: "--enable-precise-memory-info"
        run: |
          BASE_URL=${{ env.BASE_URL }} python3 -m pytest \
            tests/test_qa_comprehensive.py::TestQA17MemoryLeak \
            --timeout=120 --timeout-method=thread --tb=short -v -p no:warnings \
            --html=reports/qa17-memory.html --self-contained-html \
            --json-report --json-report-file=reports/qa17_memory_results.json \
            -p no:cacheprovider 2>&1 | tee reports/qa17-memory.txt
      - name: Upload QA Agent 14 Reports
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: qa-agent-14-reports-${{ github.run_number }}
          path: |
            reports/qa17*
            reports/screenshots/
            reports/videos/
            !reports/videos/page@*.webm
            reports/evidence/
          retention-days: 30
          if-no-files-found: warn

  # QA AGENT 15 — Network Resilience (QA-18)
  qa-agent-15-network-resilience:
    name: "QA Agent 15 — Network Resilience"
    runs-on: ubuntu-latest

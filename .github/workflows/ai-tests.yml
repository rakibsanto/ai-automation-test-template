name: Markopolo Autonomous AI Testing

on:
  push:
    branches: [main]        # trigger on every push to main
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 2 * * *"    # nightly at 2 AM UTC
  workflow_dispatch:         # manual run from GitHub UI → Actions tab → Run workflow

jobs:
  autonomous-ai-test:
    name: AI Test Agent
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Python setup ──────────────────────────────────────────────────
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      # ── 3. Python dependencies ───────────────────────────────────────────
      - name: Install Python dependencies
        run: pip install -r requirements.txt

      # ── 4. Playwright browser ─────────────────────────────────────────────
      - name: Install Playwright and Chromium
        run: playwright install chromium --with-deps

      # ── 5. Install Ollama ─────────────────────────────────────────────────
      - name: Install Ollama
        run: curl -fsSL https://ollama.ai/install.sh | sh

      # ── 6. Cache AI model to avoid re-downloading 1GB every run ──────────
      - name: Cache Ollama model
        uses: actions/cache@v4
        with:
          path: ~/.ollama/models
          key: ollama-qwen2.5-coder-1.5b-v1

      # ── 7. Start Ollama service ───────────────────────────────────────────
      - name: Start Ollama service
        run: |
          ollama serve &
          echo "Waiting for Ollama to be ready..."
          for i in $(seq 1 30); do
            if curl -s http://localhost:11434/api/tags > /dev/null 2>&1; then
              echo "Ollama is ready"
              break
            fi
            sleep 2
          done

      # ── 8. Pull the AI model ──────────────────────────────────────────────
      - name: Pull AI model
        run: |
          ollama pull qwen2.5-coder:1.5b
          ollama list

      # ── 9. Prepare output directories ─────────────────────────────────────
      - name: Prepare directories
        run: mkdir -p tests reports reports/screenshots

      # ── 10. Run the autonomous AI test agent ──────────────────────────────
      - name: Run AI Test Agent
        env:
          BASE_URL: https://beta-stg.markopolo.ai
          AI_MODEL: qwen2.5-coder:1.5b
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
          PYTHONPATH: ${{ github.workspace }}
        run: python ai_engine/agent.py

      # ── 11. Upload HTML bug report ────────────────────────────────────────
      - name: Upload HTML bug report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bug-report-${{ github.run_number }}
          path: reports/bug-report.html
          retention-days: 30

      # ── 12. Upload screenshots (POC evidence) ─────────────────────────────
      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: screenshots-${{ github.run_number }}
          path: reports/screenshots/
          retention-days: 30

      # ── 13. Upload full reports bundle ────────────────────────────────────
      - name: Upload full reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: full-reports-${{ github.run_number }}
          path: reports/
          retention-days: 30

      # ── 14. Upload AI-generated test files ───────────────────────────────
      - name: Upload generated tests
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ai-generated-tests-${{ github.run_number }}
          path: tests/
          retention-days: 30

      # ── 15. Write job summary ─────────────────────────────────────────────
      - name: Write job summary
        if: always()
        run: |
          echo "## Markopolo AI Bug Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| AI Model | qwen2.5-coder:1.5b (Ollama — no API key) |" >> $GITHUB_STEP_SUMMARY
          echo "| Target | https://beta-stg.markopolo.ai |" >> $GITHUB_STEP_SUMMARY
          echo "| Trigger | ${{ github.event_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Run | #${{ github.run_number }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f reports/summary.json ]; then
            python3 -c "
          import json
          d = json.load(open('reports/summary.json'))
          print('| Passed | ' + str(d['total_passed']) + ' |')
          print('| Failed | ' + str(d['total_failed']) + ' |')
          print('| Total Tests | ' + str(d['total_tests']) + ' |')
          print('| Bug Tickets | ' + str(d.get('total_bugs', 0)) + ' |')
          " >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Download **bug-report-${{ github.run_number }}** from Artifacts for the full HTML report with screenshots." >> $GITHUB_STEP_SUMMARY

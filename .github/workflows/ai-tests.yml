  # ─────────────────────────────────────────────────────────────────────────────
  # PHASE 4.5 — VISION-LLM UI VALIDATION (QA-22)
  # Off by default in CI (5GB model + warm-up). Set ENABLE_VISION_QA=true
  # in workflow_dispatch to run a real vision review.
  # ─────────────────────────────────────────────────────────────────────────────
  qa-agent-18-vision-ui:
    name: "QA Agent 18 — Vision-LLM UI Review"
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      BASE_URL:           ${{ github.event.inputs.base_url || 'https://dev.prowhats.com/en' }}
      ENABLE_VISION_QA:   ${{ github.event.inputs.enable_vision || 'false' }}
      VISION_MODEL:       "qwen2-vl:7b"
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with: { python-version: "3.12", cache: "pip" }
      - name: Install dependencies
        run: pip install playwright pytest pytest-playwright pytest-html pytest-timeout pytest-json-report Pillow ollama
      - name: Install Playwright Chromium
        run: playwright install chromium --with-deps
      - name: Install Ollama (only if vision QA enabled)
        if: env.ENABLE_VISION_QA == 'true'
        run: curl -fsSL https://ollama.ai/install.sh | sh
      - name: Pull vision model (only if enabled)
        if: env.ENABLE_VISION_QA == 'true'
        timeout-minutes: 15
        run: |
          ollama serve &
          for i in $(seq 1 20); do curl -s http://localhost:11434/api/tags > /dev/null 2>&1 && break; sleep 2; done
          timeout 600 ollama pull ${VISION_MODEL} || echo "vision model unavailable"
      - name: Prepare reports directory
        run: mkdir -p reports reports/screenshots reports/evidence reports/vision-shots
      - name: Run QA-22 Vision UI Review
        continue-on-error: true
        run: |
          BASE_URL=${{ env.BASE_URL }} \
            ENABLE_VISION_QA=${{ env.ENABLE_VISION_QA }} \
            VISION_MODEL=${{ env.VISION_MODEL }} \
            python3 -m pytest \
            tests/test_qa_comprehensive.py::TestQA22VisionUIValidation \
            --timeout=180 --timeout-method=thread --tb=short -v -p no:warnings \
            --html=reports/qa22-vision.html --self-contained-html \
            --json-report --json-report-file=reports/qa22_vision_results.json \
            -p no:cacheprovider 2>&1 | tee reports/qa22-vision.txt
      - name: Upload QA Agent 18 Reports
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: qa-agent-18-reports-${{ github.run_number }}
          path: |
            reports/qa22*
            reports/vision-shots/
            reports/screenshots/
            reports/videos/
            !reports/videos/page@*.webm
            reports/evidence/
          retention-days: 30
          if-no-files-found: warn

  # ─────────────────────────────────────────────────────────────────────────────
  # CONSOLIDATE — Merges ALL QA agent results into one master bug-report.html
  # Runs after every other job completes (pass or fail).
  # ─────────────────────────────────────────────────────────────────────────────
  consolidate-reports:
    name: "Consolidate — Master Bug Report"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: always()
    needs:
      - autonomous-ai-test
      - qa-agent-1-functional
      - qa-agent-2-security-perf
      - qa-agent-3-api-accessibility
      - qa-agent-4-mobile
      - qa-agent-5-langgraph
      - qa-agent-6-seo-meta
      - qa-agent-7-i18n-rtl
      - qa-agent-8-visual-regression
      - qa-agent-9-js-errors
      - qa-agent-10-security-headers
      - qa-agent-11-cookie-security
      - qa-agent-12-owasp-surface
      - qa-agent-13-lighthouse
      - qa-agent-14-memory-leak
      - qa-agent-15-network-resilience
      - qa-agent-16-exploratory
      - qa-agent-17-fuzzing
      - qa-agent-18-vision-ui
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with: { python-version: "3.12", cache: "pip" }
      - name: Install report dependencies
        run: pip install Jinja2 pytest-json-report
      - name: Prepare reports directory
        run: mkdir -p reports reports/qa_agent_1 reports/qa_agent_2 reports/qa_agent_3 reports/qa_agent_4 reports/qa_agent_5

      # Download artifacts from every QA agent
      - name: Download AI Agent artifacts
        uses: actions/download-artifact@v5
        continue-on-error: true
        with:
          name: full-reports-${{ github.run_number }}
          path: |
            reports/
            !reports/videos/page@*.webm
      - name: Download QA Agent 1 artifacts
        uses: actions/download-artifact@v5
        continue-on-error: true
        with:
          name: qa-agent-1-reports-${{ github.run_number }}
          path: reports/agent-1/
      - name: Download QA Agent 2 artifacts
        uses: actions/download-artifact@v5
        continue-on-error: true
        with:
          name: qa-agent-2-reports-${{ github.run_number }}
          path: reports/agent-2/
      - name: Download QA Agent 3 artifacts
        uses: actions/download-artifact@v5
        continue-on-error: true
        with:
          name: qa-agent-3-reports-${{ github.run_number }}
          path: reports/agent-3/
      - name: Download QA Agent 4 artifacts
        uses: actions/download-artifact@v5
        continue-on-error: true
        with:
          name: qa-agent-4-reports-${{ github.run_number }}
          path: reports/agent-4/
      - name: Download QA Agent 5 artifacts
        uses: actions/download-artifact@v5
        continue-on-error: true
        with:
          name: qa-agent-5-langgraph-${{ github.run_number }}
          path: reports/agent-5/
      - name: Download QA Agent 6 artifacts
        uses: actions/download-artifact@v5
        continue-on-error: true
        with:
          name: qa-agent-6-reports-${{ github.run_number }}
          path: reports/agent-6/
      - name: Download QA Agent 7 artifacts
        uses: actions/download-artifact@v5
        continue-on-error: true
        with:
          name: qa-agent-7-reports-${{ github.run_number }}
          path: reports/agent-7/
      - name: Download QA Agent 8 artifacts (visual regression)
        uses: actions/download-artifact@v5
        continue-on-error: true
        with:
          name: qa-agent-8-reports-${{ github.run_number }}
          path: reports/agent-8/
      - name: Download QA Agent 9 artifacts (JS error sweeper)
        uses: actions/download-artifact@v5
        continue-on-error: true
        with:
          name: qa-agent-9-reports-${{ github.run_number }}
          path: reports/agent-9/
      - name: Download QA Agent 10 artifacts (security headers)
        uses: actions/download-artifact@v5
        continue-on-error: true
        with:
          name: qa-agent-10-reports-${{ github.run_number }}
          path: reports/agent-10/
      - name: Download QA Agent 11 artifacts (cookie security)
        uses: actions/download-artifact@v5
        continue-on-error: true
        with:
          name: qa-agent-11-reports-${{ github.run_number }}
          path: reports/agent-11/
      - name: Download QA Agent 12 artifacts (OWASP surface)
        uses: actions/download-artifact@v5
        continue-on-error: true
        with:
          name: qa-agent-12-reports-${{ github.run_number }}
          path: reports/agent-12/
      - name: Download QA Agent 13 artifacts (lighthouse)
        uses: actions/download-artifact@v5
        continue-on-error: true
        with:
          name: qa-agent-13-reports-${{ github.run_number }}
          path: reports/agent-13/
      - name: Download QA Agent 14 artifacts (memory leak)
        uses: actions/download-artifact@v5
        continue-on-error: true
        with:
          name: qa-agent-14-reports-${{ github.run_number }}
          path: reports/agent-14/
      - name: Download QA Agent 15 artifacts (network resilience)
        uses: actions/download-artifact@v5
        continue-on-error: true
        with:
          name: qa-agent-15-reports-${{ github.run_number }}
          path: reports/agent-15/
      - name: Download QA Agent 16 artifacts (autonomous exploratory)
        uses: actions/download-artifact@v5
        continue-on-error: true
        with:
          name: qa-agent-16-reports-${{ github.run_number }}
          path: reports/agent-16/
      - name: Download QA Agent 17 artifacts (property-based fuzz)
        uses: actions/download-artifact@v5
        continue-on-error: true
        with:
          name: qa-agent-17-reports-${{ github.run_number }}
          path: reports/agent-17/
      - name: Download QA Agent 18 artifacts (vision UI review)
        uses: actions/download-artifact@v5
        continue-on-error: true
        with:
          name: qa-agent-18-reports-${{ github.run_number }}
          path: reports/agent-18/
      - name: Download screenshots (for embedding in master report)
        uses: actions/download-artifact@v5
        continue-on-error: true
        with:
          name: screenshots-${{ github.run_number }}
          path: reports/screenshots/

      - name: Run consolidation script
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          echo "=== Consolidating all QA agent results ==="
          ls -la reports/ | head -30 || true
          python scripts/consolidate_reports.py

      - name: Write consolidated summary
        if: always()
        run: |
          echo "## 🎯 Consolidated QA Report — All Agents" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ -f reports/consolidated_summary.json ]; then
            python3 -c "
          import json
          d = json.load(open('reports/consolidated_summary.json'))
          print(f'| ✅ Total Passed | {d.get(\"total_passed\", 0)} |')
          print(f'| ❌ Total Failed | {d.get(\"total_failed\", 0)} |')
          print(f'| 📊 Total Tests  | {d.get(\"total_tests\",  0)} |')
          print(f'| 📈 Pass Rate    | {d.get(\"pass_rate\",    \"N/A\")} |')
          print(f'| 🐛 Total Bugs   | {d.get(\"total_bugs\",   0)} |')
          print(f'| 📄 Specs/Groups | {len(d.get(\"sources\", []))} |')
          " >> "$GITHUB_STEP_SUMMARY" || true
          fi

      - name: Upload consolidated master report
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: master-bug-report-${{ github.run_number }}
          path: |
            reports/bug-report.html
            reports/consolidated_summary.json
            reports/trends.json
            reports/agent-*.html
          retention-days: 60
          if-no-files-found: warn

      # ── Build the GitHub Pages site (master + agents + history) ─────────
      # Lives at https://mejbaur-markopolo.github.io/Markopolo-Automation-Testing/
      # Pages source must be set to "gh-pages" branch (one-time setting).
      - name: Build GitHub Pages site
        if: always() && github.ref == 'refs/heads/main'
        env:
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA:        ${{ github.sha }}
          GITHUB_RUN_ID:     ${{ github.run_id }}
        run: |
          python scripts/build_pages_site.py
          echo "=== gh-pages-site contents ==="
          find gh-pages-site -type f -name '*.html' | head -30

      - name: Deploy to GitHub Pages (gh-pages branch)
        if: always() && github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token:   ${{ secrets.GITHUB_TOKEN }}
          publish_dir:    ./gh-pages-site
          publish_branch: gh-pages
          keep_files:     true   # preserve previous runs' history/run-N.html
          user_name:      "github-actions[bot]"
          user_email:     "github-actions[bot]@users.noreply.github.com"
          commit_message: "ci: publish QA report (run #${{ github.run_number }})"

name: Markopolo Autonomous AI Testing

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  autonomous-ai-test:
    name: AI Test Agent
    runs-on: ubuntu-latest
    timeout-minutes: 90       # 1.5b model needs ~15 min per spec on CPU

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Python ────────────────────────────────────────────────────────
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      # ── 3. Python dependencies ───────────────────────────────────────────
      - name: Install Python dependencies
        run: pip install -r requirements.txt

      # ── 4. Playwright ────────────────────────────────────────────────────
      - name: Install Playwright and Chromium
        run: playwright install chromium --with-deps

      # ── 5. Ollama ────────────────────────────────────────────────────────
      - name: Install Ollama
        run: curl -fsSL https://ollama.ai/install.sh | sh

      # ── 6. Cache model (saves 1 GB download on repeat runs) ──────────────
      - name: Cache Ollama model
        uses: actions/cache@v4
        with:
          path: ~/.ollama/models
          key: ollama-qwen2.5-coder-1.5b-v1

      # ── 7. Start Ollama ───────────────────────────────────────────────────
      - name: Start Ollama service
        run: |
          ollama serve &
          for i in $(seq 1 30); do
            curl -s http://localhost:11434/api/tags > /dev/null 2>&1 && echo "Ollama ready" && break
            sleep 2
          done

      # ── 8. Pull primary + backup models ──────────────────────────────────
      - name: Pull AI models
        run: |
          echo "=== Primary model ==="
          ollama pull qwen2.5-coder:1.5b
          echo "=== Backup model (llama3.2:1b, 1.3GB) ==="
          ollama pull llama3.2:1b || echo "Backup unavailable, primary only"
          echo "=== Available models ==="
          ollama list

      # ── 9. Verify everything is installed ────────────────────────────────
      - name: Verify setup
        run: |
          python --version
          python -c "import ollama; print('ollama OK')"
          python -c "import playwright; print('playwright OK')"
          python -c "import pytest; print('pytest OK')"
          python -c "from ai_engine.spec_parser import parse; print('spec_parser OK')"
          python -c "from ai_engine.reporter import generate_report; print('reporter OK')"
          python -c "from ai_engine.agent import template_tests; print('template_engine OK')"
        env:
          PYTHONPATH: ${{ github.workspace }}

      # ── 10. Prepare directories ───────────────────────────────────────────
      - name: Prepare directories
        run: mkdir -p tests reports reports/screenshots

      # ── 11. Run the AI agent ──────────────────────────────────────────────
      - name: Run AI Test Agent
        env:
          BASE_URL: https://beta-stg.markopolo.ai
          AI_MODEL: qwen2.5-coder:1.5b
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
          PYTHONPATH: ${{ github.workspace }}
          PYTHONUNBUFFERED: "1"
        run: python -u ai_engine/agent.py

      # ── 12. Upload HTML bug report ────────────────────────────────────────
      - name: Upload HTML bug report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bug-report-${{ github.run_number }}
          path: reports/bug-report.html
          retention-days: 30

      # ── 13. Upload screenshots ────────────────────────────────────────────
      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: screenshots-${{ github.run_number }}
          path: reports/screenshots/
          if-no-files-found: warn
          retention-days: 30

      # ── 14. Upload all reports ────────────────────────────────────────────
      - name: Upload full reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: full-reports-${{ github.run_number }}
          path: reports/
          retention-days: 30

      # ── 15. Upload generated tests ────────────────────────────────────────
      - name: Upload generated tests
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ai-generated-tests-${{ github.run_number }}
          path: tests/
          if-no-files-found: warn
          retention-days: 30

      # ── 16. Job summary ───────────────────────────────────────────────────
      - name: Write job summary
        if: always()
        run: |
          echo "## Markopolo AI Bug Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| AI Model | qwen2.5-coder:1.5b (Ollama — no API key) |" >> $GITHUB_STEP_SUMMARY
          echo "| Target | https://beta-stg.markopolo.ai |" >> $GITHUB_STEP_SUMMARY
          echo "| Trigger | ${{ github.event_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Run | #${{ github.run_number }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f reports/summary.json ]; then
            python3 -c "
          import json
          d = json.load(open('reports/summary.json'))
          print('| Passed | ' + str(d['total_passed']) + ' |')
          print('| Failed | ' + str(d['total_failed']) + ' |')
          print('| Total Tests | ' + str(d['total_tests']) + ' |')
          print('| Bug Tickets | ' + str(d.get('total_bugs', 0)) + ' |')
          " >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Download **bug-report-${{ github.run_number }}** from Artifacts for the full HTML report." >> $GITHUB_STEP_SUMMARY

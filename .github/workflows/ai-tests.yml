  # ─────────────────────────────────────────────────────────────────────────────
  # PHASE 4.3 — PROPERTY-BASED FUZZING (QA-20)
  # ─────────────────────────────────────────────────────────────────────────────
  qa-agent-17-fuzzing:
    name: "QA Agent 17 — Property-Based Fuzz"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      BASE_URL: ${{ github.event.inputs.base_url || 'https://dev.prowhats.com/en' }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with: { python-version: "3.12", cache: "pip" }
      - name: Install dependencies

  # ─────────────────────────────────────────────────────────────────────────────
  # PHASE 1 — DETECTION POWER-UPS
  # ─────────────────────────────────────────────────────────────────────────────
  # QA AGENT 8 — Visual Regression (QA-11)
  # Pixel-diffs each page against tests/visual_baselines/. First run after a
  # baseline change (or first ever) creates the baseline and passes; later
  # runs fail if pixel diff > 3% of total pixels.
  qa-agent-8-visual-regression:
    name: "QA Agent 8 — Visual Regression"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      BASE_URL: ${{ github.event.inputs.base_url || 'https://dev.prowhats.com/en' }}
    steps:
      - uses: actions/checkout@v5
        with: { lfs: true }   # baselines stored under tests/visual_baselines/
      - uses: actions/setup-python@v5
        with: { python-version: "3.12", cache: "pip" }
      - name: Install dependencies
        run: pip install playwright pytest pytest-playwright pytest-html pytest-timeout pytest-json-report Pillow
      - name: Install Playwright Chromium
        run: playwright install chromium --with-deps
      - name: Prepare reports directory
        run: mkdir -p reports reports/screenshots reports/evidence reports/visual-actuals reports/visual-diffs
      - name: Run QA-11 Visual Regression Tests
        continue-on-error: true
        run: |
          BASE_URL=${{ env.BASE_URL }} python3 -m pytest \
            tests/test_qa_comprehensive.py::TestQA11VisualRegression \
            --timeout=120 --timeout-method=thread --tb=short -v -p no:warnings \
            --html=reports/qa11-visual.html --self-contained-html \
            --json-report --json-report-file=reports/qa11_visual_results.json \
            -p no:cacheprovider 2>&1 | tee reports/qa11-visual.txt
      - name: Commit refreshed baselines (only on main, only when baselines change)
        if: github.ref == 'refs/heads/main'
        continue-on-error: true
        run: |
          if git diff --quiet tests/visual_baselines/; then
            echo "No baseline changes."
          else
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git config user.name  "github-actions[bot]"
            git add tests/visual_baselines/
            git commit -m "ci: auto-create visual baselines (run #${{ github.run_number }}) [skip ci]" || true
            git push origin HEAD:main || echo "push skipped (token lacks permission)"
          fi
      - name: Upload QA Agent 8 Reports
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: qa-agent-8-reports-${{ github.run_number }}
          path: |
            reports/qa11*
            reports/visual-actuals/
            reports/visual-diffs/
            reports/screenshots/
            reports/videos/
            !reports/videos/page@*.webm
            reports/evidence/
          retention-days: 30
          if-no-files-found: warn

